<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#0f1a16"/>
      <stop offset="55%" stop-color="#0a0e12"/>
      <stop offset="100%" stop-color="#070a0e"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#2a3540" stroke-width="1" opacity="0.16"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#glow)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>

  <!-- wordmark -->
  <text x="960" y="452" text-anchor="middle" font-family="Menlo, monospace" font-weight="bold"
        font-size="128" letter-spacing="12" fill="#e6edf3">PRAECO</text>

  <!-- live URL -->
  <text x="960" y="556" text-anchor="middle" font-family="Menlo, monospace"
        font-size="42" letter-spacing="2" fill="#43e08a">praeco.rectorspace.com</text>

  <!-- credentials -->
  <text x="960" y="636" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="34" fill="#9fb0bd">open source · MIT · proven on Base mainnet</text>

  <!-- repo -->
  <text x="960" y="700" text-anchor="middle" font-family="Menlo, monospace"
